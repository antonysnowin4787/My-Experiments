<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorer</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>

    <input type="checkbox" id="sidebar-toggle">

 
    <label class="overlay" for="sidebar-toggle"></label>

    <!-- Sidebar -->
    <nav class="sidebar">
        <label class="close-btn" for="sidebar-toggle" aria-label="Close menu">
            <i class="ti ti-x"></i>
        </label>
        <ul>
            <li><a href="#"><i class="ti ti-home"></i> Home</a></li>
            <li><a href="#"><i class="ti ti-device-mobile"></i> Shorts</a></li>
            <li><a href="#"><i class="ti ti-player-play"></i> Subscriptions</a></li>
            <li><a href="#"><i class="ti ti-user"></i> You</a></li>
            <li><a href="#"><i class="ti ti-history"></i> History</a></li>
        </ul>
    </nav>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <label class="menu-btn" for="sidebar-toggle" aria-label="Open menu">
                <i class="ti ti-menu-2"></i>
            </label>
            <div class="site-brand">
                <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
                    <svg class="yt-icon" viewBox="0 0 90 20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M27.9 3.6C27.6 2.5 26.7 1.6 25.6 1.3 23.6.8 14.9.8 14.9.8s-8.7 0-10.7.5C3.1 1.6 2.1 2.5 1.9 3.6 1.4 5.6 1.4 10 1.4 10s0 4.4.5 6.4c.3 1.1 1.2 2 2.3 2.3C6.2 19.2 14.9 19.2 14.9 19.2s8.7 0 10.7-.5c1.1-.3 2-1.2 2.3-2.3.5-2 .5-6.4.5-6.4s0-4.4-.5-6.4z" fill="#FF0000"/>
                        <polygon points="12.1,14.2 19.7,10 12.1,5.8" fill="white"/>
                        <text x="32" y="14.5" font-family="'YouTube Sans','Arial Black',sans-serif" font-weight="700" font-size="11" fill="black">YouTube</text>
                    </svg>
                </a>
            </div>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search" aria-label="Search">
            <button aria-label="Search button">
                <i class="ti ti-search"></i>
            </button>
        </div>
    </header>

    <!-- Hero -->
    <main class="hero">
        <div class="hero-grid">
            <div class="hero-card">
                <p class="card-name">Try searching to get started</p>
                <p class="card-label">Start watching videos to help us build a feed of videos you'll love</p>
            </div>
        </div>
    </main>

</body>
</html>
